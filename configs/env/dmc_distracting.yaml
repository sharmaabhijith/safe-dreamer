# Distracting Control Suite environment config.
# Inherits the same model/batch settings as dmc_vision; only the env changes.

task: 'distract_walker_walk'    # prefix "distract_" triggers DistractingControl
steps: 7.2e5
env_num: 16
eval_episode_num: 10
action_repeat: 2
train_ratio: 512
time_limit: 1000

seed: ${seed}
device: ${device}

size: [64, 64]

# ---- Distracting Control Suite knobs ----
# Difficulty: easy | medium | hard
difficulty: 'easy'
# Dynamic distractors (change per step) vs. static (fixed at reset)
dynamic: true
# Which distractor types to enable
background: true
camera: true
color: true
# Path to the DAVIS 2017 480p JPEGImages directory.
# Download: https://data.vision.ee.ethz.ch/csergi/share/davis/DAVIS-2017-trainval-480p.zip
# Then set this to: /path/to/DAVIS/JPEGImages/480p
background_dataset_path: ???
# Video split: train | val
background_dataset_videos: 'train'

# ---- Encoder / decoder keys (same as dmc_vision) ----
encoder:
  mlp_keys: '$^'
  cnn_keys: 'image'
decoder:
  mlp_keys: '$^'
  cnn_keys: 'image'
