# @package _global_
# =============================================================================
# Ablation A5: CNN Baseline (No Text, No FiLM, No Gate)
#
# Pure CNN encoder on distracting environment. This is the baseline that all
# multimodal ablations are compared against.
# =============================================================================

defaults:
  - /base@_global_
  - _self_

experiment: ablation_a5_cnn_baseline
logdir: /nfs-stor/salem.lahlou/asharma/logdir/ablations/${experiment}/${env.task}

env:
  task: 'distract_cheetah_run'
  steps: 1.01e6
  difficulty: 'easy'
  dynamic: true
  background: true
  camera: false
  color: false
  background_dataset_path: /nfs-stor/salem.lahlou/DAVIS/JPEGImages/480p
  background_dataset_videos: 'train'
  floor_video: true
  floor_video_alpha: 1.0
  ground_plane_alpha: null

model:
  use_multimodal_encoder: False
  lr: 4e-5
  agc: 0.3
  act_entropy: 3e-4
  kl_free: 1.0

  loss_scales:
    barlow: 0.05
    infonce: 1.0
    recon: 1.0
    rew: 1.0
    con: 1.0
    dyn: 1.0
    rep: 0.1
    policy: 1.0
    value: 1.0
    repval: 0.3
    swav: 1.0
    temp: 1.0
    norm: 1.0

  r2dreamer:
    aug:
      enabled: false
      max_delta: 3.0
      same_across_time: True
      bilinear: True
