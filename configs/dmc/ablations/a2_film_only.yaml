# @package _global_
# =============================================================================
# Ablation A2: FiLM Only (No TextGate)
#
# FiLM-conditioned visual encoder with real CLIP text, but the TextGate is
# disabled — visual_embed is fed directly to the RSSM (no text blending).
# Tests whether FiLM conditioning in the CNN layers alone is sufficient.
# =============================================================================

defaults:
  - /base@_global_
  - _self_

experiment: ablation_a2_film_only

env:
  task: 'distract_cheetah_run'
  steps: 1.01e6
  difficulty: 'easy'
  dynamic: true
  background: true
  camera: false
  color: false
  background_dataset_path: /nfs-stor/salem.lahlou/DAVIS/JPEGImages/480p
  background_dataset_videos: 'train'
  floor_video: true
  floor_video_alpha: 1.0
  ground_plane_alpha: null

model:
  use_multimodal_encoder: True
  lr: 4e-5
  agc: 0.3
  act_entropy: 3e-4
  kl_free: 1.0
  imag_horizon: 15

  loss_scales:
    barlow: 0.06
    infonce: 1.0
    recon: 1.0
    rew: 1.0
    con: 1.0
    dyn: 0.6
    rep: 0.1
    policy: 1.0
    value: 1.0
    repval: 0.3
    swav: 1.0
    temp: 1.0
    norm: 1.0

  r2dreamer:
    aug:
      enabled: true
      max_delta: 3.0
      same_across_time: True
      bilinear: True

  multimodal_encoder:
    text_context_dim: 256
    clip_model: "openai/clip-vit-base-patch32"
    max_text_length: 77
    use_text_gate: False
    gate_init_bias: -3
