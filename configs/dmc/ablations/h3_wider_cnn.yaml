# @package _global_
# =============================================================================
# Ablation H3: Parameter-Matched Wider CNN Baseline
#
# Pure CNN encoder with depth=77 (vs default 16), giving ~5.05M encoder params
# to match the multimodal encoder's ~4.97M trainable params.
# Channel depths: [154, 231, 308, 308] vs default [32, 48, 64, 64].
# out_dim = 308 * 4 * 4 = 4928  (vs 1024 for default CNN).
# The RSSM also gets larger input, so total model has MORE params than
# multimodal. If it still underperforms, text conditioning is the key factor.
# =============================================================================

defaults:
  - /base@_global_
  - _self_

experiment: ablation_h3_wider_cnn

env:
  task: 'distract_cheetah_run'
  steps: 1.01e6
  difficulty: 'easy'
  dynamic: true
  background: true
  camera: false
  color: false
  background_dataset_path: /nfs-stor/salem.lahlou/DAVIS/JPEGImages/480p
  background_dataset_videos: 'train'
  floor_video: true
  floor_video_alpha: 1.0
  ground_plane_alpha: null

model:
  use_multimodal_encoder: False
  depth: 77
  lr: 4e-5
  agc: 0.3
  act_entropy: 3e-4
  kl_free: 1.0

  loss_scales:
    barlow: 0.05
    infonce: 1.0
    recon: 1.0
    rew: 1.0
    con: 1.0
    dyn: 1.0
    rep: 0.1
    policy: 1.0
    value: 1.0
    repval: 0.3
    swav: 1.0
    temp: 1.0
    norm: 1.0

  r2dreamer:
    aug:
      enabled: false
      max_delta: 3.0
      same_across_time: True
      bilinear: True
