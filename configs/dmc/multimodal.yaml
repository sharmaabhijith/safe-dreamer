# @package _global_
# =============================================================================
# DMC (standard) + Multimodal FiLM encoder
#
# Standard DeepMind Control Suite tasks with CLIP text-conditioned FiLM encoder.
# Text descriptions guide the visual encoder via Feature-wise Linear Modulation.
# No visual distractors.
# =============================================================================

defaults:
  - /base@_global_
  - _self_

experiment: multimodal

# ---- Environment -------------------------------------------------------------
env:
  task: 'dmc_walker_walk'
  steps: 1.01e6

# ---- Model -------------------------------------------------------------------
model:
  # Enable FiLM-conditioned multimodal encoder (frozen CLIP text + CNN vision).
  use_multimodal_encoder: True

  # ---- Optimization (tune per experiment) ------------------------------------
  # Learning rate for world model + actor-critic.
  # Too high causes instability; too low slows convergence.
  lr: 4e-5
  # Adaptive gradient clipping threshold.
  # Clips gradients whose norm exceeds agc * param_norm. Prevents training spikes.
  agc: 0.3

  # ---- Policy ----------------------------------------------------------------
  # Entropy regularization for the actor.
  # Higher = more exploration but may prevent convergence to optimal policy.
  act_entropy: 3e-4
  # Free nats for KL divergence. Prevents posterior collapse by ignoring KL
  # below this threshold. Higher = less KL penalty = weaker dynamics learning.
  kl_free: 1.0

  # ---- Loss scales -----------------------------------------------------------
  # Relative weights for each loss component. Adjusting these trades off
  # reconstruction quality vs. dynamics accuracy vs. policy performance.
  loss_scales:
    barlow: 0.06        # Barlow Twins contrastive (only when rep_loss=r2dreamer)
    infonce: 1.0        # InfoNCE contrastive (only when rep_loss=infonce)
    recon: 1.0          # Image reconstruction — higher = sharper images
    rew: 1.0            # Reward prediction — critical for task performance
    con: 1.0            # Continuation (discount) prediction
    dyn: 1.0            # Dynamics (transition model) — higher = better forward predictions
    rep: 0.1            # Representation (encoder) — balances encoder vs. dynamics gradients
    policy: 1.0         # Actor loss weight
    value: 1.0          # Critic loss weight
    repval: 0.2         # Representation-value alignment
    swav: 1.0           # SwaV loss (only when rep_loss=dreamerpro)
    temp: 1.0           # Temperature scaling
    norm: 1.0           # Normalization loss

  # No augmentation needed for clean observations.
  r2dreamer:
    aug:
      enabled: false
  # Text conditioning injects task knowledge into the visual encoder,
  # which can improve sample efficiency even without distractors.
  multimodal_encoder:
    text_context_dim: 256
    clip_model: "openai/clip-vit-base-patch32"
    max_text_length: 77
    use_text_gate: True
    # Start with ~12% text influence; the gate learns the optimal ratio.
    gate_init_bias: -2
