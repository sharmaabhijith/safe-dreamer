# =============================================================================
# DMC (distracting) + Multimodal FiLM encoder
#
# Distracting Control Suite tasks with CLIP text-conditioned FiLM encoder.
# Combines visual distractor robustness with text-guided attention.
# The text conditioning helps the encoder focus on task-relevant features
# and ignore visual distractors (backgrounds, camera jitter, color changes).
# =============================================================================

defaults:
  - /base
  - override hydra/job_logging: disabled
  - _self_

# ---- Environment -------------------------------------------------------------
env:
  # Prefix "distract_" activates the DistractingControl wrapper.
  task: 'distract_walker_walk'
  # Distracting tasks benefit from longer training due to harder visual inputs.
  steps: 1.01e6

  # ---- Distractor settings ---------------------------------------------------
  # Difficulty level: controls the magnitude of each distractor type.
  #   "easy"   — mild perturbations, good for initial experiments
  #   "medium" — moderate perturbations
  #   "hard"   — strong perturbations, challenging even for robust methods
  difficulty: 'easy'
  # When True, distractors change every environment step (harder).
  # When False, distractors are sampled once per episode reset (easier).
  dynamic: false
  # Enable DAVIS 2017 video backgrounds as distractors.
  background: true
  # Enable random camera pose jitter.
  camera: false
  # Enable random body color changes.
  color: false
  # Path to DAVIS 2017 480p JPEGImages directory for background distractors.
  background_dataset_path: /nfs-stor/salem.lahlou/DAVIS/JPEGImages/480p
  # Which DAVIS split to use: 'train' or 'val'.
  background_dataset_videos: 'train'

# ---- Model -------------------------------------------------------------------
model:
  # Enable FiLM-conditioned multimodal encoder (frozen CLIP text + CNN vision).
  use_multimodal_encoder: True

  # ---- Optimization (tune per experiment) ------------------------------------
  # Learning rate for world model + actor-critic.
  # Too high causes instability; too low slows convergence.
  lr: 4e-5
  # Adaptive gradient clipping threshold.
  # Clips gradients whose norm exceeds agc * param_norm. Prevents training spikes.
  agc: 0.3

  # ---- Policy ----------------------------------------------------------------
  # Entropy regularization for the actor.
  # Higher = more exploration but may prevent convergence to optimal policy.
  act_entropy: 3e-4
  # Free nats for KL divergence. Prevents posterior collapse by ignoring KL
  # below this threshold. Higher = less KL penalty = weaker dynamics learning.
  kl_free: 1.0

  # ---- Loss scales -----------------------------------------------------------
  # Relative weights for each loss component. Adjusting these trades off
  # reconstruction quality vs. dynamics accuracy vs. policy performance.
  loss_scales:
    barlow: 0.05        # Barlow Twins contrastive (only when rep_loss=r2dreamer)
    infonce: 1.0        # InfoNCE contrastive (only when rep_loss=infonce)
    recon: 1.0          # Image reconstruction — higher = sharper images
    rew: 1.0            # Reward prediction — critical for task performance
    con: 1.0            # Continuation (discount) prediction
    dyn: 1.0            # Dynamics (transition model) — higher = better forward predictions
    rep: 0.1            # Representation (encoder) — balances encoder vs. dynamics gradients
    policy: 1.0         # Actor loss weight
    value: 1.0          # Critic loss weight
    repval: 0.3         # Representation-value alignment
    swav: 1.0           # SwaV loss (only when rep_loss=dreamerpro)
    temp: 1.0           # Temperature scaling
    norm: 1.0           # Normalization loss

  # Enable augmentation — particularly important with distractors.
  # Augmentation + text conditioning together provide the strongest robustness.
  r2dreamer:
    aug:
      enabled: true
      max_delta: 3.0
      same_across_time: True
      bilinear: True
  # Text conditioning helps the encoder attend to task-relevant features
  # (e.g., "Walk forward steadily") and suppress distractor backgrounds.
  multimodal_encoder:
    text_context_dim: 256
    clip_model: "openai/clip-vit-base-patch32"
    max_text_length: 77
    use_text_gate: True
    # Start with ~12% text influence; the gate learns the optimal ratio.
    gate_init_bias: -2
