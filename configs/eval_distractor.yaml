# Evaluation config for comparing models with and without video distractors.
#
# Each model is evaluated in TWO conditions:
#   1. Clean background (standard DMC rendering)
#   2. Distractor background (video composited behind agent)
#
# This gives a full comparison matrix:
#   CNN encoder     x  {clean, distractor}
#   Multimodal enc  x  {clean, distractor}
#
# Usage:
#   python eval.py
#   python eval.py --config configs/eval_distractor.yaml

# Models to evaluate.
# 'text' is used for multimodal encoder conditioning (ignored for CNN models).
models:
  - name: cnn
    checkpoint: logdir/2026-02-27/05-15-26/latest.pt

  - name: multimodal
    checkpoint: logdir/2026-03-01/08-57-29/latest.pt
    text: "Walk forward steadily and ignoring background strictly. Focus on main body movement."

# Evaluation settings
eval_episodes: 10
seed: 0
device: 'cuda:4'

# Video distractor settings
# Set to null to skip distractor evaluation (clean-only)
video_dir: null

# TensorBoard logging directory
logdir: 'eval_results'
